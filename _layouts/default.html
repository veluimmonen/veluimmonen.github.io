<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <nav class="nav-inner">
      <a class="nav-logo" href="{{ '/' | relative_url }}">
        <strong>{{ site.author.name }}</strong>
      </a>
      <div class="nav-links">
        <a href="{{ '/works' | relative_url }}">Works</a>
        <a href="{{ '/blog' | relative_url }}">Blog</a>
      </div>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/works' | relative_url }}">Works</a>
        <a href="{{ '/blog' | relative_url }}">Blog</a>
        <a href="https://github.com/yourusername" target="_blank" rel="noopener">GitHub</a>
        <a href="https://twitter.com/yourusername" target="_blank" rel="noopener">X</a>
        <a href="mailto:{{ site.author.email }}">Contact</a>
      </div>
      <p class="footer-copy">© {{ site.author.name }}</p>
    </div>
  </footer>

</body>
</html>
