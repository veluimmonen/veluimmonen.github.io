project:
  type: website
  output-dir: docs

website:
  title: "Velu Immonen"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: works.qmd
        text: Works
      - href: blog.qmd
        text: Blog
    right:
      - icon: github
        href: https://github.com/veluimmonen
  page-footer:
    left: "© Velu Immonen"
    right:
      - text: "Home"
        href: index.qmd
