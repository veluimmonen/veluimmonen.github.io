  title: "Velu Immonen"
  navbar:
    left:
      - href: works.qmd
        text: Works
      - href: blog.qmd
        text: Blog
  page-footer:
    left: "© Velu Immonen"
    right: |
      <div class="footer-socials">
        <a href="https://github.com/veluimmonen" class="social-icon" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="bi bi-github"></i>
        </a>
        <a href="https://www.instagram.com/veluimmonen/" class="social-icon" target="_blank" rel="noopener" aria-label="Instagram">
          <i class="bi bi-instagram"></i>
