format:
  html:
    theme: [darkly, assets/css/custom.css]
    toc: false
    link-external-newwindow: true
    smooth-scroll: true
    reading-time: true
    mermaid:
      theme: dark
    include-in-header:
      - assets/fonts.html
      - text: |
          <script>
            /* Frosted navbar — runs immediately from <head> so it's ready on first scroll */
            (function () {
              function onScroll() {
                document.body.classList.toggle('nav-scrolled', window.scrollY > 10);
              }
              window.addEventListener('scroll', onScroll, { passive: true });
              onScroll();
            })();
          </script>
    include-after-body:
      - text: |
          <script>
            /* Animated wordmark: VELU /MMONEN <-> V/
               Runs after </body> so Quarto's navbar DOM is fully settled. */
            (function () {
              function buildLogo() {
                var brand = document.querySelector('.navbar-brand');
                if (!brand) return false;
                if (brand.querySelector('.logo-collapse')) return true;

                brand.setAttribute('aria-label', 'Velu Immonen');

                var v = document.createElement('span');
                v.textContent = 'V';

                var elu = document.createElement('span');
                elu.className = 'logo-collapse';
                elu.textContent = 'ELU';

                var i = document.createElement('span');
                i.className = 'logo-accent';
                i.textContent = 'I';

                var mmonen = document.createElement('span');
                mmonen.className = 'logo-collapse logo-accent';
                mmonen.textContent = 'MMONEN';

                while (brand.firstChild) brand.removeChild(brand.firstChild);
                brand.appendChild(v);
                brand.appendChild(elu);
                brand.appendChild(i);
                brand.appendChild(mmonen);
                return true;
              }

              /* DOM is already parsed at this point; run immediately then retry
                 once more at 200ms in case Quarto re-renders the navbar */
              buildLogo();
              setTimeout(buildLogo, 200);
            })();
          </script>
