project:
  type: website
  output-dir: docs

website:
  title: "Velu Immonen"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: works.qmd
        text: Works
      - href: blog.qmd
        text: Blog
    right:
      - icon: github
        href: https://github.com/veluimmonen
  page-footer:
    left: "© Velu Immonen"
    right:
      - text: "Home"
        href: index.qmd
      - text: "Works"
        href: works.qmd
      - text: "Blog"
        href: blog.qmd

format:
  html:
    theme: [darkly, assets/css/custom.css]
    toc: false
    link-external-newwindow: true
    smooth-scroll: true
    reading-time: true
    mermaid:
      theme: dark
    include-in-header:
      - assets/fonts.html
      - text: |
          <script>
            (function () {
              /* ── Frosted navbar ── */
              function onScroll() {
                document.body.classList.toggle('nav-scrolled', window.scrollY > 10);
              }
              window.addEventListener('scroll', onScroll, { passive: true });
              onScroll();

              /* ── Animated wordmark: VELU /MMONEN <-> V/ ──
                 Uses createElementNS so the SVG glyph renders correctly.
                 Retries multiple times to survive any deferred Quarto DOM work. */
              function buildLogo() {
                var brand = document.querySelector('.navbar-brand');
                if (!brand) return false;
                if (brand.querySelector('.logo-v-glyph')) return true; /* already done */

                brand.setAttribute('aria-label', 'Velu Immonen');

                var NS = 'http://www.w3.org/2000/svg';
                var svg  = document.createElementNS(NS, 'svg');
                svg.setAttribute('viewBox', '0 0 20 22');
                svg.setAttribute('class', 'logo-v-glyph');
                svg.setAttribute('aria-hidden', 'true');
                var path = document.createElementNS(NS, 'path');
                path.setAttribute('d', 'M2,1 L2,21 L19,1');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', 'currentColor');
                path.setAttribute('stroke-width', '2.2');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);

                var elu   = document.createElement('span');
                elu.className = 'logo-collapse';
                elu.textContent = 'ELU ';

                var slash = document.createElement('span');
                slash.className = 'logo-slash';
                slash.textContent = '/';

                var rest  = document.createElement('span');
                rest.className = 'logo-collapse';
                rest.textContent = 'MMONEN';

                /* clear existing text then append */
                while (brand.firstChild) brand.removeChild(brand.firstChild);
                brand.appendChild(svg);
                brand.appendChild(elu);
                brand.appendChild(slash);
                brand.appendChild(rest);
                return true;
              }

              /* retry at 0 / 150 / 400 / 800 ms after DOM ready */
              function scheduleLogoBuilds() {
                [0, 150, 400, 800].forEach(function (delay) {
                  setTimeout(buildLogo, delay);
                });
              }

              if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', scheduleLogoBuilds);
              } else {
                scheduleLogoBuilds();
              }
              window.addEventListener('load', buildLogo);
            })();
          </script>
