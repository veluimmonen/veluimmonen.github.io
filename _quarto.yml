project:
  type: website
  output-dir: docs

website:
  title: "Velu Immonen"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: works.qmd
        text: Works
      - href: blog.qmd
        text: Blog
    right:
      - icon: github
        href: https://github.com/veluimmonen
  page-footer:
    left: "© Velu Immonen"
    right:
      - text: "Home"
        href: index.qmd
      - text: "Works"
        href: works.qmd
      - text: "Blog"
        href: blog.qmd

format:
  html:
    theme: [darkly, assets/css/custom.css]
    toc: false
    link-external-newwindow: true
    smooth-scroll: true
    reading-time: true
    mermaid:
      theme: dark
    include-in-header:
      - assets/fonts.html
      - text: |
          <script>
            (function () {
              function onScroll() {
                document.body.classList.toggle('nav-scrolled', window.scrollY > 30);
              }
              window.addEventListener('scroll', onScroll, { passive: true });
              onScroll();
            })();
          </script>
