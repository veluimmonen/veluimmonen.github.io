project:
  type: website
  output-dir: docs

website:
  title: "Velu Immonen"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: works.qmd
        text: Works
      - href: blog.qmd
        text: Blog
    right:
      - icon: github
        href: https://github.com/veluimmonen
  page-footer:
    left: "© Velu Immonen"
    right:
      - text: "Home"
        href: index.qmd
      - text: "Works"
        href: works.qmd
      - text: "Blog"
        href: blog.qmd

format:
  html:
    theme: [darkly, assets/css/custom.css]
    toc: false
    link-external-newwindow: true
    smooth-scroll: true
    reading-time: true
    mermaid:
      theme: dark
    include-in-header:
      - assets/fonts.html
      - text: |
          <script>
            /* Frosted navbar — runs immediately from <head> so it's ready on first scroll */
            (function () {
              function onScroll() {
                document.body.classList.toggle('nav-scrolled', window.scrollY > 10);
              }
              window.addEventListener('scroll', onScroll, { passive: true });
              onScroll();
            })();
          </script>
    include-after-body:
      - text: |
          <script>
            /* Animated wordmark: VELU /MMONEN <-> V/
               Runs after </body> so Quarto's navbar DOM is fully settled. */
            (function () {
              function buildLogo() {
                var brand = document.querySelector('.navbar-brand');
                if (!brand) return false;
                if (brand.querySelector('.logo-v-glyph')) return true;

                brand.setAttribute('aria-label', 'Velu Immonen');

                var NS = 'http://www.w3.org/2000/svg';
                var svg  = document.createElementNS(NS, 'svg');
                svg.setAttribute('viewBox', '0 0 20 22');
                svg.setAttribute('class', 'logo-v-glyph');
                svg.setAttribute('aria-hidden', 'true');
                var path = document.createElementNS(NS, 'path');
                path.setAttribute('d', 'M2,1 L2,21 L19,1');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', 'currentColor');
                path.setAttribute('stroke-width', '2.2');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);

                var elu   = document.createElement('span');
                elu.className = 'logo-collapse';
                elu.textContent = 'ELU ';

                var slash = document.createElement('span');
                slash.className = 'logo-slash';
                slash.textContent = '/';

                var rest  = document.createElement('span');
                rest.className = 'logo-collapse';
                rest.textContent = 'MMONEN';

                while (brand.firstChild) brand.removeChild(brand.firstChild);
                brand.appendChild(svg);
                brand.appendChild(elu);
                brand.appendChild(slash);
                brand.appendChild(rest);
                return true;
              }

              /* DOM is already parsed at this point; run immediately then retry
                 once more at 200ms in case Quarto re-renders the navbar */
              buildLogo();
              setTimeout(buildLogo, 200);
            })();
          </script>
